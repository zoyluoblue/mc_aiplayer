name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Unit, GameTest, production jar and runtime evidence
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out full repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check source-set and workflow invariants
        run: bash scripts/ci_static_check.sh

      - name: Run evidence validator adversarial self-tests
        run: bash scripts/evidence_validate.sh --self-test

      - name: Run unit tests, headless GameTests and production build
        run: ./gradlew --no-daemon --console=plain --stacktrace clean test runGameTest build

      - name: Inspect production artifacts
        run: CI_STATIC_CHECK_ARTIFACTS=1 bash scripts/ci_static_check.sh

      - name: Verify persistence across two JVM processes
        run: bash scripts/persistence_restart_test.sh

      - name: Run isolated strict-survival runtime contract
        run: >-
          bash scripts/evidence_run.sh
          --scenario capability_profile+runtime_control_suite
          --seed 20260610
          --timeout 240
          --startup-timeout 480
          --profile strict_survival

      - name: Validate sealed evidence
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r -d '' bundle; do
            found=1
            bash scripts/evidence_validate.sh --require-verified "$bundle"
          done < <(find artifacts/evidence -mindepth 1 -maxdepth 1 -type d -print0)
          [[ "$found" == 1 ]]

      - name: Upload CI diagnostics and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            artifacts/evidence/**
            build/reports/tests/**
            build/test-results/**
            build/run/gameTest/logs/**
            build/run/gameTest/crash-reports/**
            build/persistence-restart/**
            build/run/restart-*/logs/**
            build/run/restart-*/crash-reports/**
            build/libs/**
