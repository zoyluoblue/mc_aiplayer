name: Nightly deterministic runtime matrix

on:
  schedule:
    # 02:17 Asia/Shanghai. GitHub Actions cron uses UTC.
    - cron: '17 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-deterministic
  cancel-in-progress: false

jobs:
  deterministic-runtime:
    name: ${{ matrix.profile }} @ seed ${{ matrix.seed }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        profile: [strict_survival, operator]
        seed: [20260610, 3000]

    steps:
      - name: Check out full repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check CI invariants
        run: bash scripts/ci_static_check.sh

      - name: Run unit tests, GameTests and production build
        run: ./gradlew --no-daemon --console=plain --stacktrace clean test runGameTest build

      - name: Run immutable profile/runtime evidence batch
        env:
          PROFILE: ${{ matrix.profile }}
          TEST_SEED: ${{ matrix.seed }}
        run: |
          set -euo pipefail
          args=(
            --scenario capability_profile+runtime_control_suite
            --seeds "$TEST_SEED"
            --runs 1
            --timeout 300
            --startup-timeout 480
            --profile "$PROFILE"
          )
          [[ "$PROFILE" != operator ]] || args+=(--operator-capabilities all)
          bash scripts/evidence_batch.sh "${args[@]}"

      - name: Upload nightly diagnostics and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.profile }}-${{ matrix.seed }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/evidence/**
            artifacts/evidence-batches/**
            build/reports/tests/**
            build/test-results/**
            build/run/gameTest/logs/**
            build/run/gameTest/crash-reports/**
