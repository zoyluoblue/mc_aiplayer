<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Minecraft AI Agent 项目定位</title>
  <desc id="desc">玩家用自然语言给 AI 玩家下达任务，DeepSeek 负责理解和规划，本地模组按生存规则执行。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf7ed"/>
      <stop offset="0.52" stop-color="#f6fbf4"/>
      <stop offset="1" stop-color="#e7f0fa"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#28412b" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#55705a"/>
    </marker>
  </defs>
  <rect width="1120" height="520" rx="28" fill="url(#bg)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Microsoft YaHei',Arial,sans-serif">
    <text x="560" y="62" text-anchor="middle" font-size="34" font-weight="700" fill="#203325">Minecraft AI Agent</text>
    <text x="560" y="96" text-anchor="middle" font-size="18" fill="#526457">自然语言任务进入 AI，大模型只做理解和计划，真实交互由生存规则执行</text>
    <g filter="url(#shadow)">
      <rect x="66" y="170" width="208" height="178" rx="20" fill="#ffffff"/>
      <rect x="334" y="170" width="208" height="178" rx="20" fill="#ffffff"/>
      <rect x="602" y="170" width="208" height="178" rx="20" fill="#ffffff"/>
      <rect x="870" y="170" width="184" height="178" rx="20" fill="#ffffff"/>
    </g>
    <g fill="none" stroke="#55705a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M284 259 H322"/>
      <path d="M552 259 H590"/>
      <path d="M820 259 H858"/>
    </g>
    <g>
      <rect x="111" y="214" width="118" height="78" rx="10" fill="#d8ebd6"/>
      <rect x="129" y="196" width="82" height="32" rx="8" fill="#86b47f"/>
      <circle cx="170" cy="192" r="24" fill="#f3c28f"/>
      <rect x="148" y="246" width="44" height="46" rx="8" fill="#5f8f5a"/>
      <text x="170" y="325" text-anchor="middle" font-size="22" font-weight="700" fill="#263528">玩家</text>
      <text x="170" y="352" text-anchor="middle" font-size="15" fill="#647267">输入自然语言任务</text>
    </g>
    <g>
      <rect x="377" y="207" width="122" height="86" rx="18" fill="#dfe9fb"/>
      <path d="M401 235 H475 M401 258 H452 M401 281 H466" stroke="#5a74a8" stroke-width="8" stroke-linecap="round"/>
      <text x="438" y="325" text-anchor="middle" font-size="22" font-weight="700" fill="#263528">DeepSeek</text>
      <text x="438" y="352" text-anchor="middle" font-size="15" fill="#647267">理解意图和高层计划</text>
    </g>
    <g>
      <rect x="655" y="196" width="104" height="104" rx="18" fill="#f4e0b6"/>
      <path d="M681 224 h52 v52 h-52z" fill="#a97b45"/>
      <path d="M681 224 h52 l-12 -18 h-28z" fill="#c59b58"/>
      <path d="M681 276 h52 l-13 18 h-26z" fill="#805e38"/>
      <text x="706" y="325" text-anchor="middle" font-size="22" font-weight="700" fill="#263528">本地模组</text>
      <text x="706" y="352" text-anchor="middle" font-size="15" fill="#647267">查询事实并验证计划</text>
    </g>
    <g>
      <rect x="913" y="206" width="98" height="80" rx="8" fill="#8ab36f"/>
      <rect x="934" y="171" width="58" height="42" rx="4" fill="#5d8a48"/>
      <rect x="950" y="146" width="26" height="34" rx="3" fill="#7b5a3a"/>
      <rect x="932" y="246" width="26" height="40" fill="#7d7d7d"/>
      <rect x="960" y="230" width="26" height="56" fill="#9a9a9a"/>
      <text x="962" y="325" text-anchor="middle" font-size="22" font-weight="700" fill="#263528">世界</text>
      <text x="962" y="352" text-anchor="middle" font-size="15" fill="#647267">普通生存交互</text>
    </g>
    <g fill="#314235" font-size="16">
      <text x="110" y="424">不是 give/setblock 工具</text>
      <text x="110" y="454">AI 必须移动、采集、制作、消耗材料</text>
      <text x="604" y="424">配方、数量、工具、背包、箱子和路径由代码仲裁</text>
      <text x="604" y="454">失败后重新观察，再继续规划或请求玩家协助</text>
    </g>
  </g>
</svg>
