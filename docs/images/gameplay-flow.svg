<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">基础游玩流程</title>
  <desc id="desc">从召唤 AI 玩家，到下达任务、观察执行、查看状态和停止任务的基础流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6a6f59"/>
    </marker>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#3c3c2d" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1120" height="500" rx="26" fill="#f7f8f0"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Microsoft YaHei',Arial,sans-serif">
    <text x="560" y="58" text-anchor="middle" font-size="32" font-weight="700" fill="#2d3329">怎么玩</text>
    <text x="560" y="91" text-anchor="middle" font-size="17" fill="#626b5b">召唤一个 AI 玩家，然后像给队友分配任务一样给它下达目标</text>
    <g filter="url(#shadow)">
      <rect x="56" y="158" width="190" height="178" rx="18" fill="#ffffff"/>
      <rect x="280" y="158" width="190" height="178" rx="18" fill="#ffffff"/>
      <rect x="504" y="158" width="190" height="178" rx="18" fill="#ffffff"/>
      <rect x="728" y="158" width="190" height="178" rx="18" fill="#ffffff"/>
      <rect x="952" y="158" width="112" height="178" rx="18" fill="#ffffff"/>
    </g>
    <g fill="none" stroke="#6a6f59" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M256 247 H270"/>
      <path d="M480 247 H494"/>
      <path d="M704 247 H718"/>
      <path d="M928 247 H942"/>
    </g>
    <g text-anchor="middle">
      <circle cx="151" cy="213" r="34" fill="#8dbb7f"/>
      <text x="151" y="221" font-size="28" font-weight="700" fill="#ffffff">1</text>
      <text x="151" y="274" font-size="21" font-weight="700" fill="#2d3329">召唤</text>
      <text x="151" y="306" font-size="15" fill="#626b5b">/ai spawn</text>
    </g>
    <g text-anchor="middle">
      <circle cx="375" cy="213" r="34" fill="#80a6cc"/>
      <text x="375" y="221" font-size="28" font-weight="700" fill="#ffffff">2</text>
      <text x="375" y="274" font-size="21" font-weight="700" fill="#2d3329">下达任务</text>
      <text x="375" y="306" font-size="15" fill="#626b5b">/ai say 做一个门</text>
    </g>
    <g text-anchor="middle">
      <circle cx="599" cy="213" r="34" fill="#c69857"/>
      <text x="599" y="221" font-size="28" font-weight="700" fill="#ffffff">3</text>
      <text x="599" y="274" font-size="21" font-weight="700" fill="#2d3329">生存执行</text>
      <text x="599" y="304" font-size="15" fill="#626b5b">移动、采集、合成</text>
    </g>
    <g text-anchor="middle">
      <circle cx="823" cy="213" r="34" fill="#b77f8c"/>
      <text x="823" y="221" font-size="28" font-weight="700" fill="#ffffff">4</text>
      <text x="823" y="274" font-size="21" font-weight="700" fill="#2d3329">查看状态</text>
      <text x="823" y="306" font-size="15" fill="#626b5b">status / backpack</text>
    </g>
    <g text-anchor="middle">
      <circle cx="1008" cy="213" r="34" fill="#727970"/>
      <text x="1008" y="221" font-size="28" font-weight="700" fill="#ffffff">5</text>
      <text x="1008" y="274" font-size="21" font-weight="700" fill="#2d3329">停止</text>
      <text x="1008" y="306" font-size="15" fill="#626b5b">/ai stop</text>
    </g>
    <rect x="130" y="382" width="860" height="54" rx="12" fill="#e7eadc"/>
    <text x="560" y="416" text-anchor="middle" font-size="17" fill="#3f473b">也可以按 Alt+2 打开 AI 面板，macOS 使用 Option+2，直接输入任务或点击背包、状态、停止按钮</text>
  </g>
</svg>
